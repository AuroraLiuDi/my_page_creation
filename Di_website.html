<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blur Reveal Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #f5f5f5;
            overflow: hidden;
        }
        
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            cursor: none;
        }
        
        .image-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://drive.google.com/thumbnail?id=1CpXHz2YIvgtpNOEwxb1GE04A37nfPuPr&sz=w2000');
            background-size: cover;
            background-position: center;
        }
        
        .blurred {
            filter: blur(20px);
            transition: filter 0.3s ease;
        }
        
        .sharp {
            clip-path: circle(0px at 50% 50%);
    /* Removed transition for instant response */
          }
        
        .cursor-circle {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s;
            opacity: 0;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <!-- Blurred background layer -->
        <div class="image-layer blurred"></div>
        
        <!-- Sharp reveal layer -->
        <div class="image-layer sharp" id="sharpLayer"></div>
        
        <!-- Cursor indicator -->
        <div class="cursor-circle" id="cursor"></div>
    </div>

    <script>
        const container = document.getElementById('container');
        const sharpLayer = document.getElementById('sharpLayer');
        const cursor = document.getElementById('cursor');
        
        let mouseX = 0;
        let mouseY = 0;
        const revealRadius = 100; // Size of the reveal circle in pixels
        
        // Track mouse movement
        container.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // Update sharp layer reveal position
            sharpLayer.style.clipPath = `circle(${revealRadius}px at ${mouseX}px ${mouseY}px)`;
            
            // Update cursor circle position
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';
            cursor.style.opacity = '1';
        });
        
        // Hide cursor circle when mouse leaves
        container.addEventListener('mouseleave', () => {
            cursor.style.opacity = '0';
            sharpLayer.style.clipPath = `circle(0px at ${mouseX}px ${mouseY}px)`;
        });
        
        // Show cursor circle when mouse enters
        container.addEventListener('mouseenter', () => {
            cursor.style.opacity = '1';
        });
    </script>
</body>
</html>
